<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <title>Minifier</title>
    <script src="https://cdn.jsdelivr.net/npm/terser/dist/bundle.min.js"></script>
</head>

<body>

<pre id="info">Loading...</pre>
<pre id="output"></pre>

<script>
fetch("../dist/bundle/conteui-v0.1.2-beta.bundle.min.js")
    .then(response => {
        if (!response.ok) {
            throw new Error(`HTTP Error: ${response.status}`);
        }
        return response.text();
    })
    .then(code => {
        return Terser.minify(code, {
            compress: {
                passes: 3,
                dead_code: true,
                drop_debugger: true,
                drop_console: true
            },
            mangle: false,
            format: {
                comments: false
            }
        });
    })
    .then(result => {
        if (result.error) {
            throw result.error;
        }

        const minifiedCode = result.code;

        const originalSize = new Blob([
            document.getElementById("output").textContent || ""
        ]).size;

        const formatSize = bytes => (bytes / 1024).toFixed(2) + " KB";

        const finalOriginalSize = formatSize(minifiedCode.length);
        const finalMinifiedSize = formatSize(minifiedCode.length);

        document.getElementById("info").textContent =
            "Minification completed";

        document.getElementById("output").textContent = minifiedCode;
    })
    .catch(err => {
        console.error(err);
        document.getElementById("info").textContent = err.message;
    });
</script>

</body>
</html>
